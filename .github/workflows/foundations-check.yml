name: Export pinned Lean environment

on:
  push:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out scratch inputs
        uses: actions/checkout@v4

      - name: Check out exact DKPS source
        uses: actions/checkout@v4
        with:
          repository: AIQ-Kitware/aiq-dkps-formalization
          ref: ab9510f3d4e2e4248c26e2c5eeec7db75e5e4266
          path: target

      - name: Install pinned Lean toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Restore exact Mathlib cache
        working-directory: target
        run: lake exe cache get

      - name: Pack toolchain and dependencies
        run: |
          tar --zstd -cf pinned-lean-env.tar.zst \
            -C "$HOME/.elan/toolchains" leanprover--lean4---v4.32.0-rc1 \
            -C "$GITHUB_WORKSPACE/target" .lake/packages
          du -h pinned-lean-env.tar.zst

      - name: Upload environment
        uses: actions/upload-artifact@v4
        with:
          name: pinned-lean-env
          path: pinned-lean-env.tar.zst
          compression-level: 0
          retention-days: 1
