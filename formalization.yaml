fidelity:
  summary: >
    The challenge files intentionally isolate reusable, paper-agnostic theorems
    from the downstream DKPS formalization. They are not intended to state the
    DKPS paper theorems themselves. The theorem statements are high-level
    Mathlib candidates extracted from ForMathlib staging files.
  known_limitations:
    - "The challenge package has not yet been reviewed for Mathlib style, naming, minimal imports, or ideal statement shape."
    - "The Lean code was AI-authored; the human coordinator is still learning Lean and requests expert review before PR submission."
    - "The assistant-generated overlay was not Lean-built in this sandbox because Lean/Lake are not installed."

alignment:
  statements:
    - informal: "Finite configurations with equal pairwise inner products are equivalent up to a linear isometry."
      lean: "AIQChallenge.procrustes_rigidity_of_inner_eq"
      status: "proved by the downstream ForMathlib staging library"
    - informal: "Equal Gram matrices characterize equality up to linear isometry."
      lean: "AIQChallenge.gram_eq_gram_iff_exists_linearIsometryEquiv"
      status: "proved by the downstream ForMathlib staging library"
    - informal: "A PSD matrix of rank at most d is a Gram matrix of d-dimensional vectors."
      lean: "AIQChallenge.psd_rank_le_iff_exists_conjTranspose_mul_self"
      status: "proved by the downstream ForMathlib staging library"
    - informal: "Weyl's eigenvalue perturbation inequality for symmetric finite-dimensional operators."
      lean: "AIQChallenge.weyl_abs_eigenvalues_sub_le"
      status: "proved by the downstream ForMathlib staging library"

automation:
  methods:
    - method: "AI-authored Lean formalization with human coordination"
      models:
        - "GPT-5.2 / ChatGPT 5.2 (reported by human coordinator; GPT commits are often not marked in git metadata)"
        - "Harmonic Aristotle (repo comments identify Aristotle-generated Helm scaffolding)"
        - "Codex 5.5 High / GPT-5.5 family labels in repository comments"
        - "Claude Opus 4.8 (repo comments and git history mark staging/plumbing/generalization work; Opus 4.7/5.7 mentions were typos)"
        - "Claude Fable 5 (repo comments identify many difficult Acharyya and ForMathlib proofs)"
      framework: >
        Multiple interactive and agentic LLM sessions coordinated by Jon Crall,
        with repeated local lake build checks, git-history inspection, and
        progressive removal of downstream theorem assumptions.
      human_role: >
        The human coordinator is an experienced software engineer and computer
        vision researcher who directed the project, ran builds, inspected
        theorem interfaces, coordinated with subject-matter experts, and is
        learning Lean. The human coordinator does not claim to have personally
        authored the Lean proofs.
      review_status: >
        The code builds in the source repository per user-observed reports and
        repository history, but the proposed Mathlib candidates have not yet
        undergone independent mathematical review, Mathlib-style review, or PR
        minimization.
      prompting_notes: >
        Early GPT-5.2, Aristotle, GPT-5.5, and Opus 4.8 sessions established
        much of the downstream DKPS theorem scaffold and reductions, often with
        heavy assumptions. Claude Fable 5 removed several difficult assumptions
        by proving formalization-resistant spectral, MDS, measurability, and
        alignment infrastructure. Later Opus 4.8 sessions performed additional
        plumbing, staging, and moderate generalization into the ForMathlib
        library. This summary combines repository comments/history with
        human-supplied provenance and should be refined as session logs are
        audited.
      soundness_gate: >
        Claimed theorem closes are trusted only insofar as they are accepted by
        Lean's kernel and use only allowed axioms. The challenge package exposes
        a small set of claims for comparator-style validation.
      cost:
        wall_time: "multi-session effort from early 2026 through 2026-06-12"
        spend_usd: "not fully reconstructed"
        hardware: "local development machine plus hosted model access"
