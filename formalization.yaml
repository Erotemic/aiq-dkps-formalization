      comparator_config: "comparator/aiq-gram-rigidity.json"
    - declaration: "ForMathlib.Matrix.gram_eq_gram_iff_exists_linearIsometryEquiv_map_eq"
      file: "ForMathlib/Analysis/InnerProductSpace/GramMatrix.lean"
      sorry_count: 0
      axioms: ["propext", "Classical.choice", "Quot.sound"]
      challenge_file: "Challenge/Gram/Conformance.lean"
      solution_file: "Challenge/Gram/Leaderboard.lean"
      challenge_declaration: "ForMathlib.Matrix.gram_eq_gram_iff_exists_linearIsometryEquiv_map_eq"
      source_declaration: "ForMathlib.Matrix.gram_eq_gram_iff_exists_linearIsometryEquiv_map_eq"
      source_file: "ForMathlib/Analysis/InnerProductSpace/GramMatrix.lean"
