# formalization.yaml (v0.3): repo-root metadata for an AI-authored formalization project.
# Schema reference: https://github.com/mathlib-initiative/formalization.yaml

version: "v0.3"

project:
  name: "AIQ DKPS formalization: reusable spectral, MDS, and geometry infrastructure"
  authors:
    - "Jon Crall"
  license: "Apache-2.0"
  repository: "https://github.com/AIQ-Kitware/aiq-dkps-formalization"
  validation_note: "Commit-specific validation metadata is not duplicated here; see git history and the reported build/comparator checks under status.repository_build."

sources:
  - title: "Consistent Estimation of Generative Model Representations in the Data Kernel Perspective Space"
    authors: ["Acharyya", "Trosset", "Priebe", "Helm"]
    id: "Acharyya et al. 2024"
    type: "research paper"
    author_contacted: "yes; ongoing subject-matter discussion"
    prior_work: "Downstream theorem layer in Acharyya2024/; reusable infrastructure staged in ForMathlib/."
  - title: "Concentration Bounds on Response-Based Vector Embeddings of Black-Box Generative Models"
    authors: ["Acharyya", "Agterberg", "Park", "Priebe"]
    id: "Acharyya et al. 2025"
    type: "research paper"
    author_contacted: "yes; ongoing subject-matter discussion"
    prior_work: "Downstream theorem layer in Acharyya2025/; reusable infrastructure staged in ForMathlib/."
  - title: "Statistical Inference on Black-Box Generative Models in the Data Kernel Perspective Space"
    authors: ["Helm", "Acharyya", "Park", "Duderstadt", "Priebe"]
    id: "Helm et al. 2025"
    type: "research paper"
    author_contacted: "yes; ongoing subject-matter discussion"
    prior_work: "Downstream theorem layer in Helm2025/."
  - title: "DKPS Quench theorem layer"
    authors: ["AIQ / Kitware formalization project"]
    id: "DkpsQuench"
    type: "downstream formal theorem layer"
    author_contacted: "n/a"
    prior_work: "DkpsQuench/ consumes Acharyya2025 concentration interfaces."

status:
  repository_build:
    last_user_reported_build: "lake build completes green. Challenge layer restructured 2026-06-14 into MathlibCandidate (3) + MathlibPending (10 comparator configs + 1 leaderboard-only); all leaf #print axioms verified clean."
    last_user_reported_challenge_summary: "Re-run scripts/run_challenge_comparator.sh (real landrun) to cite comparator pass/fail; the conformance/leaderboard modules build green and all leaves are axiom-clean."
    challenge_commands:
      - "lake env lean Challenge/MathlibCandidate/GramRigidity/Conformance.lean"
      - "lake env lean Challenge/MathlibCandidate/GramRigidity/Leaderboard.lean"
      - "bash scripts/run_challenge_comparator.sh"
    comparator_configs:
      - "comparator/candidate-01-gram-rigidity.json"
      - "comparator/candidate-02-courant-fischer-weyl.json"
      - "comparator/candidate-03-davis-kahan.json"
      - "comparator/pending-berge.json"
      - "comparator/pending-rank-factorization.json"
      - "comparator/pending-rank-psd-realization.json"
      - "comparator/pending-restrict-cover-measurable.json"
      - "comparator/pending-sample-mean-mse.json"
      - "comparator/pending-near-isometry.json"
      - "comparator/pending-cfc-measurable.json"
      - "comparator/pending-matrix-concentration.json"
      - "comparator/pending-probability-qol.json"
      - "comparator/pending-tendsto-in-measure.json"
  scope: >
    The repository fully formalizes four DKPS-family papers (the end states) and
    stages the reusable, paper-agnostic results it required in ForMathlib for
    upstreaming. Challenges are split into two families (see Challenge/README.md):
    MathlibCandidate, a small focused set of drop-ready PRs, and MathlibPending,
    proven results held back pending further work. Each challenge lists only the
    leaf (top-level) theorems; #print axioms on a leaf transitively certifies its
    whole proof tree. The four papers are documented but are not comparator
    challenges (their statements are inherently in each paper's own vocabulary).
  main_results:
    - declaration: "ForMathlib.Matrix.gram_eq_gram_iff_exists_linearIsometryEquiv_map_eq"
      file: "ForMathlib/Analysis/InnerProductSpace/GramMatrix.lean"
      sorry_count: 0
      axioms: ["propext", "Classical.choice", "Quot.sound"]
      challenge_file: "Challenge/MathlibCandidate/GramRigidity/Conformance.lean"
      solution_file: "Challenge/MathlibCandidate/GramRigidity/Leaderboard.lean"
      category: "Procrustes / Gram-matrix rigidity"
      comparator_config: "comparator/candidate-01-gram-rigidity.json"
    - declaration: "ForMathlib.abs_eigenvalues_sub_le_opNorm"
      file: "ForMathlib/Analysis/InnerProductSpace/CourantFischer.lean"
      sorry_count: 0
      axioms: ["propext", "Classical.choice", "Quot.sound"]
      challenge_file: "Challenge/MathlibCandidate/CourantFischerWeyl/Conformance.lean"
      solution_file: "Challenge/MathlibCandidate/CourantFischerWeyl/Leaderboard.lean"
      category: "Courant-Fischer min-max + Weyl perturbation"
      comparator_config: "comparator/candidate-02-courant-fischer-weyl.json"
    - declaration: "ForMathlib.sum_norm_sub_starProjection_span_sq_le"
      file: "ForMathlib/Analysis/InnerProductSpace/DavisKahan.lean"
      sorry_count: 0
      axioms: ["propext", "Classical.choice", "Quot.sound"]
      challenge_file: "Challenge/MathlibCandidate/DavisKahan/Conformance.lean"
      solution_file: "Challenge/MathlibCandidate/DavisKahan/Leaderboard.lean"
      category: "Davis-Kahan cross-block / sin-Theta"
      comparator_config: "comparator/candidate-03-davis-kahan.json"
  pending_challenges:
    note: "Proven (sorry-free, axiom-clean) but held back from the upstream push; see Challenge/README.md for why each is not yet PR-ready."
    configs:
      - "comparator/pending-berge.json"
      - "comparator/pending-rank-factorization.json"
      - "comparator/pending-rank-psd-realization.json"
      - "comparator/pending-restrict-cover-measurable.json"
      - "comparator/pending-sample-mean-mse.json"
      - "comparator/pending-near-isometry.json"
      - "comparator/pending-cfc-measurable.json"
      - "comparator/pending-matrix-concentration.json"
      - "comparator/pending-probability-qol.json"
      - "comparator/pending-tendsto-in-measure.json"
    leaderboard_only:
      - declaration: "ForMathlib.Matrix.measurable_specTransform"
        solution_file: "Challenge/MathlibPending/SpectralFunctionMeasurable/Leaderboard.lean"
        reason: "Matrix-valued measurability statement is not cleanly Mathlib-only expressible; axiom-audit leaderboard only, no comparator conformance."
  dkps_papers:
    note: "Fully formalized end-state papers; documented here and in each library's README, NOT comparator challenges. All capstones verified #print axioms = {propext, Classical.choice, Quot.sound} (2026-06-14)."
    papers:
      - id: "Acharyya2024"
        capstones:
          - "Acharyya2024.Consistency.fixed_models_fixed_queries_consistency"
          - "Acharyya2024.Consistency.growing_models_growing_queries_consistency"
      - id: "Acharyya2025"
        capstones:
          - "Acharyya2025.RateChain.tendsto_endToEndRate_zero"
      - id: "DkpsQuench"
        capstones:
          - "DkpsQuench.AcharyyaBridge.quench_uniform_embedding_error_of_finite_configError"
      - id: "Helm2025"
        capstones:
          - "Helm2025.DKPS.Theorem1"
          - "Helm2025.DKPS.Theorem2_bayes"

fidelity:
  summary: >
    The challenge files intentionally isolate reusable, paper-agnostic theorems
    from the downstream DKPS formalization. They are not intended to state the
    DKPS paper theorems themselves. The theorem statements are high-level
    Mathlib candidates extracted from ForMathlib staging files.
  known_limitations:
    - "The challenge package has not yet been reviewed for Mathlib style, naming, minimal imports, or ideal statement shape."
    - "The Lean code was AI-authored; the human coordinator is still learning Lean and requests expert review before PR submission."
    - "Assistant-generated overlays are not Lean-built in the assistant sandbox because Lean/Lake are not installed there; rely on local lake/comparator runs for validation."

review:
  status: "self-assessed"
  reviewers:
    - "Jon Crall"
  notes: >
    Self-assessed metadata and challenge package. The dedicated Gram, PSD-Gram,
    Spectral, and Inventory comparator configs have been reported locally as
    passing. The candidates have not yet undergone independent Mathlib reviewer
    approval or source-author verification.

alignment:
  statements:
    - informal: "Two vector families with equal pairwise inner products have isometrically equivalent generated spans."
      lean: "ForMathlib.exists_linearIsometryEquiv_span_map_eq_of_inner_eq"
      status: "proved by the downstream ForMathlib staging library"
    - informal: "Finite configurations with equal pairwise inner products are equivalent up to a linear isometry."
      lean: "ForMathlib.exists_linearIsometryEquiv_map_eq_of_inner_eq"
      status: "proved by the downstream ForMathlib staging library"
    - informal: "Equal Gram matrices characterize equality up to linear isometry."
      lean: "ForMathlib.Matrix.gram_eq_gram_iff_exists_linearIsometryEquiv_map_eq"
      status: "proved by the downstream ForMathlib staging library"
    - informal: "A PSD matrix of rank at most d is a Gram matrix of d-dimensional vectors."
      lean: "ForMathlib.Matrix.posSemidef_and_rank_le_iff_exists_conjTranspose_mul_self"
      status: "proved by the downstream ForMathlib staging library"
    - informal: "Weyl's eigenvalue perturbation inequality for symmetric finite-dimensional operators."
      lean: "ForMathlib.abs_eigenvalues_sub_le"
      status: "proved by the downstream ForMathlib staging library"

automation:
  methods:
    - method: "agent"
      description: "AI-authored Lean formalization with human coordination"
      models:
        - "GPT-5.2 / ChatGPT 5.2 (reported by human coordinator; GPT commits are often not marked in git metadata)"
        - "Harmonic Aristotle (repo comments identify Aristotle-generated Helm scaffolding)"
        - "Codex 5.5 High / GPT-5.5 family labels in repository comments"
        - "GPT-5.5 Thinking (post-proof critic for Mathlib PR preparation and presentation; not claimed as primary proof author)"
        - "Claude Opus 4.8 (repo comments and git history mark staging/plumbing/generalization work; Opus 4.7/5.7 mentions were typos)"
        - "Claude Fable 5 (repo comments identify many difficult Acharyya and ForMathlib proofs)"
      framework: >
        Multiple interactive and agentic LLM sessions coordinated by Jon Crall,
        with repeated local lake build checks, git-history inspection, and
        progressive removal of downstream theorem assumptions.
      human_role: >
        The human coordinator is an experienced software engineer and computer
        vision researcher who directed the project, ran builds, inspected
        theorem interfaces, coordinated with subject-matter experts, and is
        learning Lean. The human coordinator does not claim to have personally
        authored the Lean proofs.
      review_status: >
        The code builds in the source repository per user-observed reports and
        repository history, but the proposed Mathlib candidates have not yet
        undergone independent mathematical review, Mathlib-style review, or PR
        minimization.
      prompting_notes: >
        Early GPT-5.2, Aristotle, GPT-5.5, and Opus 4.8 sessions established
        much of the downstream DKPS theorem scaffold and reductions, often with
        heavy assumptions. Claude Fable 5 removed several difficult assumptions
        by proving formalization-resistant spectral, MDS, measurability, and
        alignment infrastructure. Later Opus 4.8 sessions performed additional
        plumbing, staging, and moderate generalization into the ForMathlib
        library. This summary combines repository comments/history with
        human-supplied provenance and should be refined as session logs are
        audited.
      review_and_presentation_assistance: >
        GPT-5.5 Thinking was used after proof-generation work as a critic and
        planning assistant for Mathlib PR preparation and presentation. This
        included theorem-surface triage, readiness audits, comparator/challenge
        packaging feedback, formalization.yaml refinement, and Zulip/PR-message
        drafting or editing. This role is distinct from primary Lean proof
        authorship; suggestions from this review pass are intended to be applied
        only through human review plus local Lean, lint, build, and comparator
        validation.
      soundness_gate: >
        Claimed theorem closes are trusted only insofar as they are accepted by
        Lean's kernel and use only allowed axioms. The challenge package exposes
        a small headline sampler and a broader ForMathlib inventory for
        comparator-style validation.
      cost:
        wall_time: "multi-session effort from early 2026 through 2026-06-12"
        spend_usd: "not fully reconstructed"
        hardware: "local development machine plus hosted model access"


challenge_packages:
  candidate_configs:
    - comparator/candidate-01-gram-rigidity.json
    - comparator/candidate-02-courant-fischer-weyl.json
    - comparator/candidate-03-davis-kahan.json
  pending_configs:
    - comparator/pending-berge.json
    - comparator/pending-rank-factorization.json
    - comparator/pending-rank-psd-realization.json
    - comparator/pending-restrict-cover-measurable.json
    - comparator/pending-sample-mean-mse.json
    - comparator/pending-near-isometry.json
    - comparator/pending-cfc-measurable.json
    - comparator/pending-matrix-concentration.json
    - comparator/pending-probability-qol.json
    - comparator/pending-tendsto-in-measure.json
  note: >-
    One comparator config per planned PR. MathlibCandidate is the focused upstream
    push (Gram rigidity, Courant-Fischer/Weyl, Davis-Kahan); MathlibPending holds
    proven results that need further work before upstreaming. Each lists only leaf
    theorems. See Challenge/README.md for the full manifest and the four
    documented (non-comparator) DKPS papers.
