      solution_file: "Challenge/Gram/Leaderboard.lean"
      challenge_declaration: "ForMathlib.exists_linearIsometryEquiv_map_eq_of_inner_eq"
      source_declaration: "ForMathlib.exists_linearIsometryEquiv_map_eq_of_inner_eq"
      source_file: "ForMathlib/Analysis/InnerProductSpace/GramMatrix.lean"
      category: "Procrustes / Gram-matrix rigidity"
      sorry_count_in_solution: 0
