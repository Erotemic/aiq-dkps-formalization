name = "aiq_dkps_formalization"
version = "0.1.0"
keywords = ["math", "formalization", "DKPS", "MDS", "spectral-perturbation"]
defaultTargets = ["ForMathlib", "Acharyya2024", "Acharyya2025", "DkpsQuench", "Helm2025"]

# Standalone Lean workspace for four DKPS-related theorem developments.
# The libraries share one Mathlib checkout/build and are intentionally kept as
# separate top-level Lean libraries so each paper-facing theorem layer can be
# built or imported independently.

[leanOptions]
pp.unicode.fun = true
# Avoid accidental free variables in theorem statements.
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"

# Mathlib-staging library: paper-agnostic results restated in Mathlib idiom,
# one file per proposed Mathlib destination path.  See ForMathlib/README.md.
[[lean_lib]]
name = "ForMathlib"

[[lean_lib]]
name = "Acharyya2024"

[[lean_lib]]
name = "Acharyya2025"

[[lean_lib]]
name = "DkpsQuench"

[[lean_lib]]
name = "Helm2025"


# Comparator/challenge modules for community calibration of AI-authored
# ForMathlib candidates. These are intentionally not default targets.
[[lean_lib]]
name = "ChallengeConformance"

[[lean_lib]]
name = "ChallengeLeaderboard"
